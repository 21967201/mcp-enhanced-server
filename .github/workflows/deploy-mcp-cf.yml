name: Deploy MCP Enhanced Server to Cloudflare

on:
  push:
    branches: [main]
    paths:
      - 'mcp-enhanced-server/cloudflare/**'
      - '.github/workflows/deploy-mcp-cf.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-enhanced-server/cloudflare

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Create D1 database if not exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          DB_NAME="mcp-enhanced-tasks"
          echo "Checking if D1 database '${DB_NAME}' exists..."

          RESPONSE=$(curl -s "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")

          DB_ID=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for db in data.get('result', []):
              if db['name'] == '${DB_NAME}':
                  print(db['uuid'])
                  break
          " 2>/dev/null || true)

          if [ -z "$DB_ID" ]; then
            echo "Creating D1 database '${DB_NAME}'..."
            CREATE_RESPONSE=$(curl -s -X POST \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"name\": \"${DB_NAME}\"}")

            DB_ID=$(echo "$CREATE_RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          if data.get('success'):
              print(data['result']['uuid'])
          else:
              print('ERROR: ' + str(data.get('errors')), file=sys.stderr)
              sys.exit(1
          " 2>/dev/null)

            if [ -z "$DB_ID" ]; then
              echo "Failed to create D1 database"
              echo "$CREATE_RESPONSE"
              exit 1
            fi
            echo "Created D1 database with ID: ${DB_ID}"
          else
            echo "D1 database already exists with ID: ${DB_ID}"
          fi

          echo "DB_ID=${DB_ID}" >> $GITHUB_ENV
          echo "DATABASE_ID=${DB_ID}" >> $GITHUB_ENV

      - name: Update wrangler.toml with database ID
        run: |
          sed -i "s/REPLACE_WITH_YOUR_D1_DATABASE_ID/${{ env.DB_ID }}/g" wrangler.toml
          echo "Updated wrangler.toml with database ID: ${{ env.DB_ID }}"

      - name: Initialize D1 schema
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler d1 execute mcp-enhanced-tasks \
            --remote \
            --file=src/schema.sql \
            --var CLOUDFLARE_ACCOUNT_ID:${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Set Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "${{ secrets.MCP_AUTH_TOKEN }}" ]; then
            echo "${{ secrets.MCP_AUTH_TOKEN }}" | npx wrangler secret put MCP_AUTH_TOKEN
          fi

      - name: Output deployment info
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **D1 Database ID**: \`${{ env.DB_ID }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Worker URL**: https://mcp-enhanced-server.\${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.workers.dev" >> $GITHUB_STEP_SUMMARY
          echo "- **MCP Endpoint**: https://mcp-enhanced-server.\${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.workers.dev/mcp" >> $GITHUB_STEP_SUMMARY